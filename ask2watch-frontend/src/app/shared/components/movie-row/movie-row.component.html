<section class="space-y-4">
  <div class="container flex items-center gap-3">
    @if (icon() === 'eye') {
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-primary">
        <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/>
      </svg>
    } @else if (icon() === 'sparkles') {
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gold">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
      </svg>
    }
    <h2 class="text-3xl tracking-wide">{{ title() }}</h2>
  </div>

  <div class="relative group/row">
    <!-- Left scroll button -->
    @if (canScrollLeft()) {
      <button (click)="scroll('left')"
              class="absolute left-2 top-1/2 -translate-y-1/2 z-10 bg-background/70 backdrop-blur rounded-md p-2
                     opacity-0 group-hover/row:opacity-100 transition-opacity cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
    }

    <!-- Scroll container -->
    <div #scrollContainer
         class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide container"
         style="scroll-behavior: smooth"
         (scroll)="updateScrollState()">
      <ng-content />
    </div>

    <!-- Right scroll button -->
    @if (canScrollRight()) {
      <button (click)="scroll('right')"
              class="absolute right-2 top-1/2 -translate-y-1/2 z-10 bg-background/70 backdrop-blur rounded-md p-2
                     opacity-0 group-hover/row:opacity-100 transition-opacity cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m9 18 6-6-6-6"/>
        </svg>
      </button>
    }
  </div>
</section>
