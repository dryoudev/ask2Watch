<div [class]="'flex items-center gap-0.5 ' + (editable() ? 'cursor-pointer' : '')">
  @for (filled of stars(); track i; let i = $index) {
    <svg
      xmlns="http://www.w3.org/2000/svg"
      [attr.width]="size()"
      [attr.height]="size()"
      viewBox="0 0 24 24"
      [attr.fill]="filled ? 'currentColor' : 'none'"
      stroke="currentColor"
      stroke-width="2"
      [class]="filled ? 'text-gold' : 'text-muted-foreground/30'"
      [class.hover:opacity-80]="editable()"
      [class.transition-opacity]="editable()"
      (click)="onStarClick(i)"
    >
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
    </svg>
  }
</div>
