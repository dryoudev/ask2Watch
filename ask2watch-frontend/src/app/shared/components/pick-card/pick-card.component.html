<div [class]="'group animate-fade-in cursor-pointer ' + (compact() ? 'w-[160px] flex-shrink-0' : '')"
     [style.animation-delay]="delay"
     [style.opacity]="0"
     (click)="cardClick.emit(pick())">
  <div class="relative overflow-hidden rounded-lg card-hover">
    <img [src]="poster" [alt]="pick().media.title"
         class="w-full aspect-[2/3] object-cover" loading="lazy" />
    <div class="absolute inset-0 bg-gradient-to-t from-background via-background/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
    <div class="absolute inset-x-3 bottom-3 flex gap-2 opacity-0 translate-y-2 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
      <button
        type="button"
        class="flex-1 inline-flex items-center justify-center gap-2 rounded-md bg-emerald-500/95 px-3 py-2 text-xs font-semibold text-white shadow-lg hover:bg-emerald-400"
        title="Ajouter à la liste des vus"
        (click)="onAddToWatched($event)">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12l5 5L20 7" />
        </svg>
        <span>Vu</span>
      </button>
      <button
        type="button"
        class="inline-flex items-center justify-center rounded-md bg-red-500/95 p-2 text-white shadow-lg hover:bg-red-400"
        title="Supprimer des picks"
        (click)="onRemoveFromPicks($event)">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18" />
          <path d="M8 6V4h8v2" />
          <path d="M19 6l-1 14H6L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
        </svg>
      </button>
    </div>
    <!-- Badges (top-right) -->
    <div class="absolute top-2 right-2 flex flex-col gap-1">
      <span class="bg-primary/90 text-white text-xs px-2 py-1 rounded font-semibold">Pick</span>
      @if (pick().media.imdbRating) {
        <div class="bg-gold text-gold-foreground px-2 py-1 rounded text-xs font-bold flex items-center gap-1">
          <span>★</span>
          <span>{{ pick().media.imdbRating }}</span>
        </div>
      }
    </div>
  </div>
  <div class="mt-2 space-y-1">
    <h3 class="text-sm font-semibold leading-tight line-clamp-1">{{ pick().media.title }}</h3>
    <div class="flex items-center gap-2 text-xs text-muted-foreground">
      <span>{{ pick().media.year }}</span>
      <span class="text-primary">&bull;</span>
      <span>{{ pick().media.genres }}</span>
    </div>
  </div>
</div>
