<div class="relative min-h-screen flex items-center justify-center">
  <!-- Background overlay -->
  <div class="absolute inset-0 bg-background/60"></div>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md mx-4 glass-card rounded-xl p-8 animate-fade-in">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-3 mb-8">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-primary">
        <rect width="18" height="18" x="3" y="3" rx="2"/><line x1="7" x2="7" y1="3" y2="21"/><line x1="17" x2="17" y1="3" y2="21"/><line x1="3" x2="21" y1="7" y2="7"/><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="17" y2="17"/>
      </svg>
      <h1 class="text-5xl tracking-wider text-gradient-red">ask2Watch</h1>
    </div>

    <p class="text-center text-muted-foreground mb-8">
      Track your movies & series. Discover new picks.
    </p>

    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div class="space-y-2">
        <label class="block text-sm text-muted-foreground">Email</label>
        <input type="email" [(ngModel)]="email" name="email"
               class="w-full bg-secondary border border-border rounded-lg px-4 py-3 text-sm
                      focus:outline-none focus:ring-2 focus:ring-primary"
               placeholder="admin@ask2watch.com" />
      </div>

      <div class="space-y-2">
        <label class="block text-sm text-muted-foreground">Password</label>
        <input type="password" [(ngModel)]="password" name="password"
               class="w-full bg-secondary border border-border rounded-lg px-4 py-3 text-sm
                      focus:outline-none focus:ring-2 focus:ring-primary"
               placeholder="••••••••" />
      </div>

      @if (error()) {
        <p class="text-sm text-destructive">{{ error() }}</p>
      }

      <button type="submit"
              class="w-full bg-primary text-white rounded-lg py-3 text-lg font-semibold
                     hover:bg-primary/90 transition-colors cursor-pointer h-12">
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-muted-foreground mt-6">
      Don't have an account? <button class="text-primary hover:underline cursor-pointer">Sign up</button>
    </p>
  </div>
</div>
